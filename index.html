            <div class="bingo-button" id="btn-4_2" onclick="showQuestion(4, 2)"></div>

            <div class="bingo-button" id="btn-5_3" onclick="showQuestion(5, 3)"></div>
            <div class="bingo-button" id="btn-6_3" onclick="showQuestion(6, 3)"></div>
            <h1>60</h1>
            <div class="bingo-button" id="btn-1_4" onclick="showQuestion(1, 4)"></div>
            <div class="bingo-button" id="btn-2_4" onclick="showQuestion(2, 4)"></div>
            <div class="bingo-button" id="btn-3_4" onclick="showQuestion(3, 4)"></div>

        </div>
    </div>
    
    <div class="bingo-teams">
        <div id="teams" class="answers">

        </div>
    </div>

    <div id="dark-screen"></div>

    <div id="question-element" class="element">
        <p id="question">Question</p>
        <div class="answers">
            <button class="answers-button" onclick="answerQuestion('a')" id="a">Button 1</button>
            <button class="answers-button" onclick="answerQuestion('b')" id="b">Button 2</button>
            <button class="answers-button" onclick="answerQuestion('c')" id="c">Button 3</button>
            <button class="answers-button" onclick="answerQuestion('d')" id="d">Button 4</button>
            <button class="answers-button" onclick="displayHint()">💡</button>
        </div>
    </div>

    <div id="team-element" class="element">
        <input type="text" id="teamName" placeholder="Podaj nazwę drużyny">
        <input type="color" id="teamColor" placeholder="Podaj kolor drużyny">
        <button id="team-button" onclick="addTeam()">Dodaj drużynę</button>
        <button id="done" onclick="doneTeams()">✅</button>
    </div>

    <div id="retake-element" class="element">
        <p>Czy któraś drużyna chce powtórzyć pytanie? (za połowę punktów)</p>
        <div class="answers" id="retakers">
            <button onclick="retake(null)">❌</button>
        </div>
    </div>
    <script src="questions.js"></script>
    <script src="teams.js"></script>
    <script src="grid.js"></script>
    <script src="gamelogic.js"></script>
</body>
</html>
